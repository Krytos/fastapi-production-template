repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.0
    hooks:
      - id: ruff-check
      - id: ruff-format

  - repo: local
    hooks:
      - id: ty-check
        name: ty check
        entry: uv run ty check .
        language: system
        pass_filenames: false

      - id: pytest-unit
        name: pytest unit tests
        entry: uv run pytest tests/unit
        language: system
        pass_filenames: false

      - id: terraform-fmt-check
        name: terraform fmt check
        entry: python scripts/terraform_fmt_check.py
        language: system
        pass_filenames: false
