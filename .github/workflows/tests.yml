name: tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.14"

      - name: Sync dependencies
        run: uv sync --all-groups

      - name: Unit tests
        run: uv run pytest tests/unit

      - name: Integration tests
        run: uv run pytest tests/integration

      - name: Coverage gate
        run: uv run pytest --cov=src --cov-branch --cov-report=term-missing --cov-fail-under=100
