name: tox

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  tox:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install tox
        run: python -m pip install --upgrade pip tox

      - name: Run tox
        run: tox
