name: tox

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  tox:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.14"

      - name: Sync dependencies
        run: uv sync --all-groups

      - name: Run tox
        run: uv run tox
