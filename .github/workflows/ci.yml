name: ci-cd

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  docs-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Smoke-test documented commands
        run: bash scripts/docs_smoke.sh

  quality-and-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies
        run: uv sync --all-groups

      - name: Ruff
        run: uv run ruff check .

      - name: Ty
        run: uv run ty check .

      - name: Unit tests
        run: uv run pytest tests/unit

      - name: Integration tests
        run: uv run pytest tests/integration

      - name: Coverage gate
        run: uv run pytest --cov=src --cov-branch --cov-report=term-missing --cov-fail-under=100

  tox:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install tox
        run: python -m pip install --upgrade pip tox

      - name: Run tox
        run: tox

  terraform-validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt
        run: terraform -chdir=infra/terraform-aws fmt -check

      - name: Terraform init
        run: terraform -chdir=infra/terraform-aws init -backend=false

      - name: Terraform validate
        run: terraform -chdir=infra/terraform-aws validate

      - name: Terraform fmt (Azure)
        run: terraform -chdir=infra/terraform-azure fmt -check

      - name: Terraform init (Azure)
        run: terraform -chdir=infra/terraform-azure init -backend=false

      - name: Terraform validate (Azure)
        run: terraform -chdir=infra/terraform-azure validate

      - name: Terraform fmt (GCP)
        run: terraform -chdir=infra/terraform-gcp fmt -check

      - name: Terraform init (GCP)
        run: terraform -chdir=infra/terraform-gcp init -backend=false

      - name: Terraform validate (GCP)
        run: terraform -chdir=infra/terraform-gcp validate

  publish-pypi:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - docs-smoke
      - quality-and-tests
      - tox
      - terraform-validate
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build package
        run: uv build

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
